  <line x1="32" y1="32" x2="32" y2="36" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="14" y1="33" x2="14" y2="35" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="20" y1="33" x2="20" y2="35" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="26" y1="33" x2="26" y2="35" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
